<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Plato</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: black;
}

/* Pantalla inicio */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("Loading screen.png") center center / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  z-index: 10;
}

#enterButton {
  margin-bottom: 60px;
  padding: 18px 40px;
  font-size: 20px;
  border: none;
  border-radius: 40px;
  background: white;
  color: black;
  font-weight: bold;
}

#loader {
  margin-bottom: 80px;
  font-size: 18px;
  color: white;
  display: none;
}

a-scene {
  display: none;
}
</style>
</head>

<body>

<!-- Pantalla inicio -->
<div id="startScreen">
  <button id="enterButton">Ver en tu mesa</button>
  <div id="loader">Cargando...</div>
</div>

<!-- A-FRAME (iOS y fallback Android) -->
<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;">

  <a-marker preset="hiro">
    <a-gltf-model
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="10 10 10">
    </a-gltf-model>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const button = document.getElementById("enterButton");
const loader = document.getElementById("loader");
const startScreen = document.getElementById("startScreen");
const scene = document.querySelector("a-scene");

button.addEventListener("click", () => {

  button.style.display = "none";
  loader.style.display = "block";

  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = ua.includes("android");
  const isIOS = /iphone|ipad|ipod/.test(ua);

  // ANDROID → Scene Viewer
  if (isAndroid) {

    const sceneViewerUrl =
      `intent://arvr.google.com/scene-viewer/1.0?` +
      `file=${encodeURIComponent(window.location.origin + "/Plato_01.glb")}` +
      `&mode=ar_only` +
      `&resizable=false` +
      `#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`;

    window.location.href = sceneViewerUrl;

    // Fallback a A-Frame si falla
    setTimeout(() => {
      startScreen.style.display = "none";
      scene.style.display = "block";
    }, 2500);
  }

  // iOS → A-Frame directo
  else if (isIOS) {
    startScreen.style.display = "none";
    scene.style.display = "block";
  }

  // Otros dispositivos → A-Frame
  else {
    startScreen.style.display = "none";
    scene.style.display = "block";
  }

});
</script>

</body>
</html>
