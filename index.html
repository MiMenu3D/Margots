<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AR Plato</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  height: 100%;
}

/* Pantalla inicio */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100dvh; /* ← CLAVE */
  background-image: url("Loading screen.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: black;
  z-index: 10;
}

/* Botón */
#enterButton {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 40px;
  font-size: 20px;
  border-radius: 40px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
}

#loader {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  color: white;
  display: none;
}

a-scene {
  display: none;
}
</style>
</head>

<body>

<div id="startScreen">
  <button id="enterButton">Ver en tu mesa</button>
  <div id="loader">Cargando...</div>
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;">

  <a-marker preset="hiro">
    <a-gltf-model
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="10 10 10">
    </a-gltf-model>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const button = document.getElementById("enterButton");
const loader = document.getElementById("loader");
const startScreen = document.getElementById("startScreen");
const scene = document.querySelector("a-scene");

button.addEventListener("click", () => {

  button.style.display = "none";
  loader.style.display = "block";

  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = ua.includes("android");

  if (isAndroid) {

    const fileURL = window.location.origin + "/Plato_01.glb";

    const sceneViewerUrl =
      `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(fileURL)}&mode=ar_only&resizable=false#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`;

    window.location.href = sceneViewerUrl;

    setTimeout(() => {
      startScreen.style.display = "none";
      scene.style.display = "block";
    }, 2500);

  } else {
    startScreen.style.display = "none";
    scene.style.display = "block";
  }

});
</script>

</body>
</html>
