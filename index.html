<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú AR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  height:100vh;
  overflow:hidden;
}

#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:url("Loading screen.png") center center / cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:60px;
  box-sizing:border-box;
  z-index:10;
}

button{
  padding:11px 20px;
  font-size:15px;
  margin:8px;
  border-radius:10px;
  border:none;
}

#fallback{
  display:none;
  font-size:13px;
  opacity:0.85;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>Logo 3D</h2>
  <button onclick="launchAR()">Ver en tu mesa</button>
  <button id="fallback" onclick="openFallback()">¿No puedes verlo? Ver modelo 3D</button>
</div>

<script>

const modelFile = "Plato_01.glb";

function getBasePath(){
  return window.location.href.substring(0, window.location.href.lastIndexOf('/')+1);
}

function isIOS(){
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function launchAR(){

  if(isIOS()){
    loadAFrame();
    return;
  }

  const base = getBasePath();
  const file = base + modelFile;

  const intent =
  `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(file)}&mode=ar_only&resizable=false&disable_occlusion=true&rotation=0,90,0#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end;`;

  window.location.href = intent;

  setTimeout(()=>{
    document.getElementById("fallback").style.display="block";
  },6000);
}

function openFallback(){
  const base = getBasePath();
  window.location.href = base + "viewer.html";
}

function loadAFrame(){

  // Eliminamos pantalla inicial completamente
  const start = document.getElementById("startScreen");
  if(start) start.remove();

  // Eliminar cualquier escena previa fantasma
  const oldScene = document.querySelector("a-scene");
  if(oldScene) oldScene.remove();

  // Cargar A-Frame sin caché
  const aframe = document.createElement("script");
  aframe.src = "https://aframe.io/releases/1.4.2/aframe.min.js?v=" + Date.now();
  document.head.appendChild(aframe);

  const mindar = document.createElement("script");
  mindar.src = "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js?v=" + Date.now();
  document.head.appendChild(mindar);

  mindar.onload = () => {

    const scene = document.createElement("a-scene");

    scene.setAttribute("mindar-image","imageTargetSrc: margot_targets.mind; autoStart: true;");
    scene.setAttribute("color-space","sRGB");
    scene.setAttribute("renderer","colorManagement: true; physicallyCorrectLights: true; exposure: 2;");
    scene.setAttribute("vr-mode-ui","enabled: false");
    scene.setAttribute("device-orientation-permission-ui","enabled: false");

    scene.innerHTML = `
      <a-assets>
        <a-asset-item id="model" src="${modelFile}"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="3" position="1 3 2"></a-light>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#model" rotation="90 0 0" scale="10 10 10"></a-gltf-model>
      </a-entity>
    `;

    document.body.appendChild(scene);
  }
}

</script>

</body>
</html>
