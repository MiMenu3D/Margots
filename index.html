<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Menu AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
#enterAR {
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  padding:14px 22px;
  background:rgba(0,0,0,0.7);
  color:white;
  border-radius:12px;
  border:none;
  z-index:10;
}
</style>
</head>

<body>

<button id="enterAR">Entrar en AR</button>

<!-- ================= FALLBACK MINDAR ================= -->
<a-scene
  id="mindarScene"
  mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true;"
  renderer="physicallyCorrectLights:true; colorManagement:true; exposure:2; toneMapping:ACESFilmicToneMapping;"
  color-space="sRGB"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  style="display:none"
>
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex:0">
    <a-gltf-model 
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>
</a-scene>

<script>

let renderer, scene, camera;
let xrSession = null;
let hitTestSource = null;
let localSpace = null;
let viewerSpace = null;
let reticle = null;
let model = null;

const button = document.getElementById("enterAR");

async function init() {

  if (navigator.xr && await navigator.xr.isSessionSupported("immersive-ar")) {
    startHitTest();
  } else {
    // Fallback MindAR
    document.getElementById("mindarScene").style.display = "block";
    button.style.display = "none";
  }
}

async function startHitTest() {

  button.style.display = "none";

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.12,0.15,32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial()
  );
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  xrSession = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures:["hit-test"]
  });

  renderer.xr.setSession(xrSession);

  localSpace = await xrSession.requestReferenceSpace("local");
  viewerSpace = await xrSession.requestReferenceSpace("viewer");
  hitTestSource = await xrSession.requestHitTestSource({space:viewerSpace});

  xrSession.addEventListener("select", onSelect);

  renderer.setAnimationLoop(render);
}

function onSelect() {

  if (!reticle.visible) return;

  if (!model) {

    const loader = new THREE.GLTFLoader();
    loader.load("Plato_02.glb", (gltf) => {

      model = gltf.scene;
      model.rotation.x = Math.PI/2;
      model.scale.set(2.8,2.8,2.8);

      model.position.setFromMatrixPosition(reticle.matrix);
      scene.add(model);

    });

  } else {
    model.position.setFromMatrixPosition(reticle.matrix);
  }
}

function render(timestamp, frame) {

  if (frame) {

    const hitTestResults = frame.getHitTestResults(hitTestSource);

    if (hitTestResults.length > 0) {

      const hit = hitTestResults[0];
      const pose = hit.getPose(localSpace);

      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);

    } else {
      reticle.visible = false;
    }
  }

  renderer.render(scene, camera);
}

button.addEventListener("click", init);

</script>

</body>
</html>
