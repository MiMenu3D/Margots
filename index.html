<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logo 3D</title>

<!-- A-Frame (solo se usará en iOS) -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

<!-- Model Viewer (fallback universal) -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: black;
}

/* ---------- PANTALLA INICIO ---------- */
#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 10;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 8px;
}

#fallbackBtn {
  font-size: 13px;
  background: transparent;
  color: white;
  text-decoration: underline;
}
</style>
</head>

<body>

<!-- ================= PANTALLA INICIO ================= -->
<div id="startScreen">
  <button class="button" onclick="launchAR()">Ver en tu mesa</button>
  <button id="fallbackBtn" onclick="openFallback()">¿No puedes verlo? Pulsa aquí</button>
</div>

<!-- ================= A-FRAME iOS ================= -->
<a-scene
  id="iosScene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="10 10 10"
      position="0 0 0">
    </a-gltf-model>
  </a-entity>
</a-scene>

<script>
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isAndroid = /Android/.test(navigator.userAgent);

function launchAR() {

  document.getElementById("startScreen").style.display = "none";

  if (isAndroid) {
    launchSceneViewer();
  } 
  else if (isIOS) {
    launchIOS();
  } 
  else {
    openFallback();
  }
}

/* ================= ANDROID → SCENE VIEWER ================= */

function launchSceneViewer() {

  const modelUrl = window.location.origin + window.location.pathname.replace("index.html","") + "Plato_01.glb";

  const intent =
    `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}` +
    `&mode=ar_only` +
    `&resizable=false` +
    `#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`;

  window.location.href = intent;
}

/* ================= iOS → A-FRAME ================= */

function launchIOS() {

  const scene = document.querySelector("#iosScene");
  scene.style.display = "block";

  const mindarSystem = scene.systems["mindar-image-system"];
  mindarSystem.start();
}

/* ================= FALLBACK MODEL-VIEWER ================= */

function openFallback() {

  document.body.innerHTML = `
  <model-viewer
    src="Plato_01.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    style="width:100vw;height:100vh;background:black;">
  </model-viewer>`;
}
</script>

</body>
</html>
