<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

model-viewer{
  width:100vw;
  height:100vh;
  background:black;
}

.controls{
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
}

button{
  padding:14px 24px;
  font-size:22px;
  margin:0 20px;
  border-radius:10px;
  border:none;
}
</style>
</head>
<body>

<model-viewer
  id="mv"
  src="Plato_01.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  environment-image="neutral"
  shadow-intensity="0"
  exposure="1"
>
</model-viewer>

<div class="controls">
  <button onclick="prev()">←</button>
  <button onclick="next()">→</button>
</div>

<script>

const models=["Plato_01.glb","Plato_02.glb"];
let current=0;

function prev(){
  current=(current-1+models.length)%models.length;
  document.getElementById("mv").src=models[current];
}

function next(){
  current=(current+1)%models.length;
  document.getElementById("mv").src=models[current];
}

</script>
</body>
</html>
