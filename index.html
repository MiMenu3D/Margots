<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets id="assets"></a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-entity id="modelWrapper" rotation="90 0 0" scale="0.6 0.6 0.6"></a-entity>

  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="0 1 1" intensity="1"></a-light>

</a-scene>

<script>
const TOTAL_MODELS = 20;
let currentIndex = 0;

const wrapper = document.querySelector("#modelWrapper");
const assets = document.querySelector("#assets");

function modelPath(i) {
  const num = String(i + 1).padStart(2, '0');
  return `models/plato_${num}.glb`;
}

function preloadModel(i) {
  const id = `model-${i}`;
  if (!document.getElementById(id)) {
    const asset = document.createElement("a-asset-item");
    asset.setAttribute("id", id);
    asset.setAttribute("src", modelPath(i));
    assets.appendChild(asset);
  }
}

function loadCurrentModel() {

  wrapper.innerHTML = "";

  const id = `model-${currentIndex}`;
  preloadModel(currentIndex);

  const model = document.createElement("a-gltf-model");
  model.setAttribute("src", `#${id}`);
  model.setAttribute("position", "0 0 0");
  model.setAttribute("rotation", "0 0 0");

  wrapper.appendChild(model);

  // Humo solo en plato 03 (index 2)
  if (currentIndex === 2) {
    const smoke = createSmoke();
    wrapper.appendChild(smoke);
  }

  // Precarga vecinal
  preloadModel((currentIndex + 1) % TOTAL_MODELS);
  preloadModel((currentIndex - 1 + TOTAL_MODELS) % TOTAL_MODELS);
}

function createSmoke() {

  const smokeGroup = document.createElement("a-entity");
  smokeGroup.setAttribute("position", "0 0 0");

  const PARTICLES = 16;
  const particles = [];
  const EMITTER_RADIUS = 0.75; // 300% más grande aprox

  for (let i = 0; i < PARTICLES; i++) {

    const p = document.createElement("a-sphere");
    p.setAttribute("radius", 0.025);
    p.setAttribute("color", "#ffffff");
    p.setAttribute("opacity", 0.14);
    p.setAttribute("transparent", true);

    smokeGroup.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * EMITTER_RADIUS;

    particles.push({
      el: p,
      life: Math.random(),
      baseX: Math.cos(angle) * radius,
      baseY: Math.sin(angle) * radius
    });
  }

  function animate() {

    particles.forEach(p => {

      p.life += 0.009;
      if (p.life > 1) p.life = 0;

      // 🔥 SUBE EN Z (vertical real tras rotación 90º)
      const height = p.life * 0.5; // +25%

      const driftX = Math.sin(p.life * 4) * 0.03;
      const driftY = Math.cos(p.life * 3) * 0.03;

      p.el.object3D.position.set(
        p.baseX + driftX,
        p.baseY + driftY,
        height + 0.02 // ligero offset para no atravesar malla
      );

      const scale = 0.6 + p.life * 1.2;
      p.el.object3D.scale.set(scale, scale, scale);

    });

    requestAnimationFrame(animate);
  }

  animate();

  return smokeGroup;
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    currentIndex = (currentIndex + 1) % TOTAL_MODELS;
    loadCurrentModel();
  }
  if (e.key === "ArrowLeft") {
    currentIndex = (currentIndex - 1 + TOTAL_MODELS) % TOTAL_MODELS;
    loadCurrentModel();
  }
});

preloadModel(0);
preloadModel(1);
loadCurrentModel();

</script>
</body>
</html>
