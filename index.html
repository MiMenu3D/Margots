<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu AR</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; }
button {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  padding: 14px 22px;
  border-radius: 12px;
  border:none;
  background: rgba(0,0,0,0.7);
  color:white;
  z-index:10;
}
</style>
</head>
<body>

<button id="startAR">Ver en AR</button>

<script>

const modelURL = location.origin + location.pathname.replace("index.html","") + "Plato_01.glb";

async function start() {

  // 1️⃣ Intentar WebXR real
  if (navigator.xr) {
    try {
      const supported = await navigator.xr.isSessionSupported("immersive-ar");
      if (supported) {
        startWebXR();
        return;
      }
    } catch(e){}
  }

  // 2️⃣ Intentar Scene Viewer directo (Android)
  if (/android/i.test(navigator.userAgent)) {
    const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_preferred#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`;
    window.location.href = intent;
    return;
  }

  // 3️⃣ Fallback A-Frame marker
  startAFrame();

}

function startWebXR() {

  const script = document.createElement("script");
  script.type = "module";
  script.src = "https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js";
  document.head.appendChild(script);

  script.onload = () => {

    const mv = document.createElement("model-viewer");
    mv.src = modelURL;
    mv.setAttribute("ar","");
    mv.setAttribute("ar-modes","webxr");
    mv.setAttribute("ar-placement","floor");
    mv.setAttribute("environment-image","neutral");
    mv.setAttribute("exposure","2");
    mv.style.width = "100vw";
    mv.style.height = "100vh";

    document.body.appendChild(mv);
    document.getElementById("startAR").remove();
  };
}

function startAFrame() {

  const aframeScript = document.createElement("script");
  aframeScript.src = "https://aframe.io/releases/1.4.2/aframe.min.js";
  document.head.appendChild(aframeScript);

  const mindScript = document.createElement("script");
  mindScript.src = "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js";
  document.head.appendChild(mindScript);

  mindScript.onload = () => {

    document.body.innerHTML = `
    <a-scene
      mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true;"
      renderer="physicallyCorrectLights:true;colorManagement:true;exposure:2;"
      color-space="sRGB"
      vr-mode-ui="enabled:false">
      <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
      <a-entity mindar-image-target="targetIndex:0">
        <a-gltf-model src="Plato_01.glb" rotation="90 0 0" scale="2.8 2.8 2.8"></a-gltf-model>
      </a-entity>
    </a-scene>
    `;
  };
}

document.getElementById("startAR").addEventListener("click", start);

</script>

</body>
</html>
