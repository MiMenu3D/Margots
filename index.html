<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú AR</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

button{
  padding:14px 24px;
  font-size:18px;
  margin:10px;
  border-radius:10px;
  border:none;
}
#fallback{
  display:none;
  margin-top:20px;
  font-size:14px;
  opacity:0.8;
}
</style>
</head>
<body>

<h2 id="title">Plato 01</h2>

<button onclick="launchAR()">Ver en tu mesa</button>

<button id="fallback" onclick="openFallback()">
¿No puedes verlo? Ver modelo 3D
</button>

<script>

const model = "Plato_01.glb";

function getBasePath(){
  return window.location.href.substring(0, window.location.href.lastIndexOf('/')+1);
}

function launchAR(){

  const base = getBasePath();
  const file = base + model;

  const intent =
  `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(file)}&mode=ar_only&resizable=false&disable_occlusion=true&rotation=0,90,0#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end;`;

  window.location.href = intent;

  setTimeout(()=>{
    document.getElementById("fallback").style.display="block";
  },6000);
}

function openFallback(){
  const base = getBasePath();
  window.location.href = base + "viewer.html";
}

</script>
</body>
</html>
