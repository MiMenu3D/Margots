<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: sans-serif;
  }

  model-viewer {
    width: 100vw;
    height: 100vh;
    background-color: #000;
  }

  .ui-button {
    position: fixed;
    bottom: 20px;
    font-size: 28px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 12px;
    border: none;
    z-index: 10;
  }

  #prev { left: 20px; }
  #next { right: 20px; }
</style>
</head>

<body>

<model-viewer
  id="viewer"
  src="Plato_01.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  environment-image="neutral"
  exposure="2"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  shadow-softness="1"
  loading="eager"
>
</model-viewer>

<button id="prev" class="ui-button">←</button>
<button id="next" class="ui-button">→</button>

<script>

const models = [
  "Plato_01.glb",
  "Plato_02.glb"
];

let currentIndex = 0;

const viewer = document.getElementById("viewer");

function showModel(index) {
  currentIndex = index;
  viewer.src = models[currentIndex];
}

document.getElementById("prev").addEventListener("click", () => {
  showModel((currentIndex - 1 + models.length) % models.length);
});

document.getElementById("next").addEventListener("click", () => {
  showModel((currentIndex + 1) % models.length);
});

</script>

</body>
</html>
