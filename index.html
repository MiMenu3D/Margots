<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Dual AR Test</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
.ui-button {
  position:fixed;
  bottom:20px;
  font-size:28px;
  padding:12px 20px;
  background:rgba(0,0,0,0.6);
  color:white;
  border-radius:12px;
  border:none;
  z-index:10;
}
#prev { left:20px; }
#next { right:20px; }
</style>
</head>

<body>

<button id="prev" class="ui-button">←</button>
<button id="next" class="ui-button">→</button>

<!-- ========== A-FRAME (Plato 01) ========== -->
<a-scene
  id="aframeScene"
  mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model 
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>
</a-scene>

<script>

let currentMode = 0; // 0 = MindAR, 1 = HitTest

let renderer, scene, camera;
let xrSession = null;
let hitTestSource = null;
let localSpace = null;
let reticle = null;
let model = null;

async function startHitTest() {

  document.querySelector("#aframeScene").style.display = "none";

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera();

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.1,0.12,32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial()
  );
  reticle.visible = false;
  scene.add(reticle);

  xrSession = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures:["hit-test"]
  });

  renderer.xr.setSession(xrSession);

  localSpace = await xrSession.requestReferenceSpace("local");
  const viewerSpace = await xrSession.requestReferenceSpace("viewer");
  hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

  xrSession.addEventListener("end", () => {
    renderer.domElement.remove();
    renderer = null;
    currentMode = 0;
    document.querySelector("#aframeScene").style.display = "block";
  });

  renderer.setAnimationLoop(renderXR);
}

function renderXR(timestamp, frame) {

  if (frame && hitTestSource) {

    const hitTestResults = frame.getHitTestResults(hitTestSource);

    if (hitTestResults.length > 0) {

      const hit = hitTestResults[0];
      const pose = hit.getPose(localSpace);

      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      reticle.matrix.decompose(
        reticle.position,
        reticle.quaternion,
        reticle.scale
      );

      if (!model) {
        const loader = new THREE.GLTFLoader();
        loader.load("Plato_02.glb", (gltf) => {

          model = gltf.scene;
          model.rotation.x = Math.PI / 2;
          model.scale.set(2.8,2.8,2.8);
          model.position.copy(reticle.position);
          scene.add(model);

        });
      }

    }
  }

  renderer.render(scene, camera);
}

document.querySelector("#next").addEventListener("click", async () => {

  if (currentMode === 0) {
    currentMode = 1;
    if (navigator.xr) {
      await startHitTest();
    } else {
      alert("WebXR no soportado");
    }
  }

});

document.querySelector("#prev").addEventListener("click", async () => {

  if (currentMode === 1 && xrSession) {
    await xrSession.end();
  }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

</body>
</html>
