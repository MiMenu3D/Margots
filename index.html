<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Menu AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    .ui-button {
      position: fixed;
      bottom: 20px;
      font-size: 28px;
      padding: 12px 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
      border: none;
      z-index: 10;
    }

    #prev { left: 20px; }
    #next { right: 20px; }
  </style>
</head>

<body>

<button id="prev" class="ui-button">←</button>
<button id="next" class="ui-button">→</button>

<a-scene
  mindar-image="
    imageTargetSrc: margot_targets.mind;
    autoStart: true;
    filterMinCF: 0.0001;
    filterBeta: 0.003;
  "
  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    exposure: 2;
    toneMapping: ACESFilmicToneMapping;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets timeout="10000">
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0" id="anchor"></a-entity>

</a-scene>

<script>

// ================= MODELOS (precarga vecinal estable) =================

const modelPaths = [
  "Plato_01.glb",
  "Plato_02.glb",
  "Plato_03.glb",
  "Plato_04.glb",
  "Plato_05.glb"
];

let currentIndex = 0;
let currentModel = null;
const anchor = document.querySelector("#anchor");

const modelCache = new Map();
const BASE_SCALE = 2.8;

function createModel(index) {

  const wrapper = document.createElement("a-entity");

  const model = document.createElement("a-gltf-model");
  model.setAttribute("src", modelPaths[index]);
  model.setAttribute("position", "0 0 0");
  model.setAttribute("rotation", "90 0 0");
  model.setAttribute("scale", `${BASE_SCALE} ${BASE_SCALE} ${BASE_SCALE}`);

  wrapper.appendChild(model);

  addSmoke(wrapper);

  return wrapper;
}

function preloadModel(index) {
  if (modelCache.has(index)) return;

  const model = createModel(index);
  model.setAttribute("visible", "false");
  anchor.appendChild(model);
  modelCache.set(index, model);
}

function updatePreload() {
  const total = modelPaths.length;
  const prev = (currentIndex - 1 + total) % total;
  const next = (currentIndex + 1) % total;

  const needed = [prev, currentIndex, next];

  needed.forEach(i => preloadModel(i));

  modelCache.forEach((model, index) => {
    if (!needed.includes(index)) {
      anchor.removeChild(model);
      modelCache.delete(index);
    }
  });
}

function showModel(index) {
  updatePreload();

  modelCache.forEach((model, i) => {
    model.setAttribute("visible", i === index);
  });

  currentIndex = index;
}

// ================= HUMO SIMPLE Y ESTABLE =================

function addSmoke(parent) {

  const PARTICLES = 6;

  for (let i = 0; i < PARTICLES; i++) {

    const p = document.createElement("a-sphere");

    p.setAttribute("radius", 0.015);
    p.setAttribute("color", "#ffffff");
    p.setAttribute("opacity", 0.25);
    p.setAttribute("transparent", true);

    parent.appendChild(p);

    animateParticle(p);
  }
}

function animateParticle(p) {

  function rise() {

    const startX = (Math.random() - 0.5) * 0.12;
    const startZ = (Math.random() - 0.5) * 0.12;

    p.object3D.position.set(startX, 0.02, startZ);
    p.setAttribute("opacity", 0.25);

    let start = null;
    const duration = 2200;

    function frame(time) {

      if (!start) start = time;
      const t = (time - start) / duration;

      if (t >= 1) {
        rise();
        return;
      }

      p.object3D.position.y = 0.02 + t * 0.35;
      p.setAttribute("opacity", 0.25 * (1 - t));

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  rise();
}

// ================= UI =================

document.querySelector("#prev").addEventListener("click", () => {
  const prev = (currentIndex - 1 + modelPaths.length) % modelPaths.length;
  showModel(prev);
});

document.querySelector("#next").addEventListener("click", () => {
  const next = (currentIndex + 1) % modelPaths.length;
  showModel(next);
});

// Inicial
showModel(currentIndex);

</script>

</body>
</html>
