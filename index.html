<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Menu AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    .ui-button {
      position: fixed;
      bottom: 20px;
      font-size: 28px;
      padding: 12px 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 12px;
      border: none;
      z-index: 10;
    }

    #prev { left: 20px; }
    #next { right: 20px; }
  </style>
</head>

<body>

<button id="prev" class="ui-button">←</button>
<button id="next" class="ui-button">→</button>

<a-scene
  mindar-image="
    imageTargetSrc: margot_targets.mind;
    autoStart: true;
  "
  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    exposure: 2;
    toneMapping: ACESFilmicToneMapping;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets>
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0" id="anchor"></a-entity>

</a-scene>

<script>

// ================= MODEL SYSTEM =================

const modelPaths = [
  "Plato_01.glb",
  "Plato_02.glb",
  "Plato_03.glb",
  "Plato_04.glb",
  "Plato_05.glb"
];

const BASE_SCALE = 2.8; // ~40% menos que 4.7
let currentIndex = 0;
let isAnimating = false;

const anchor = document.querySelector("#anchor");
const modelCache = new Map();

function createModel(index) {

  const wrapper = document.createElement("a-entity");

  const model = document.createElement("a-gltf-model");
  model.setAttribute("src", modelPaths[index]);
  model.setAttribute("rotation", "90 0 0");
  model.setAttribute("scale", `${BASE_SCALE} ${BASE_SCALE} ${BASE_SCALE}`);
  model.setAttribute("material", "transparent:true; opacity:1; envMapIntensity:1.8");

  wrapper.appendChild(model);

  // Añadir humo
  addSmoke(wrapper);

  return wrapper;
}

function preloadModel(index) {
  if (modelCache.has(index)) return;

  const model = createModel(index);
  model.setAttribute("visible", "false");
  anchor.appendChild(model);
  modelCache.set(index, model);
}

function updatePreload() {
  const total = modelPaths.length;
  const prev = (currentIndex - 1 + total) % total;
  const next = (currentIndex + 1) % total;

  const needed = [prev, currentIndex, next];

  needed.forEach(i => preloadModel(i));

  modelCache.forEach((model, index) => {
    if (!needed.includes(index)) {
      anchor.removeChild(model);
      modelCache.delete(index);
    }
  });
}

// ================= TRANSITION SYSTEM =================

function transitionTo(newIndex, direction) {

  if (isAnimating) return;
  isAnimating = true;

  updatePreload();

  const outgoing = modelCache.get(currentIndex);
  const incoming = modelCache.get(newIndex);

  incoming.setAttribute("visible", "true");

  const startX = direction === "next" ? 1.8 : -1.8;
  const endX = direction === "next" ? -1.8 : 1.8;

  incoming.object3D.position.x = startX;
  incoming.object3D.children[0].material.opacity = 0.2;

  // OUT animation
  outgoing.setAttribute("animation__moveout", {
    property: "position",
    to: `${endX} 0 0`,
    dur: 500,
    easing: "easeInCubic"
  });

  outgoing.children[0].setAttribute("animation__fadeout", {
    property: "material.opacity",
    to: 0.2,
    dur: 300,
    easing: "linear"
  });

  // IN animation
  incoming.setAttribute("animation__movein", {
    property: "position",
    to: "0 0 0",
    dur: 500,
    easing: "easeOutCubic"
  });

  incoming.children[0].setAttribute("animation__fadein", {
    property: "material.opacity",
    to: 1,
    dur: 350,
    easing: "linear"
  });

  // Bounce fuerte + goma
  setTimeout(() => {

    incoming.setAttribute("animation__bounceX", {
      property: "position",
      to: `${direction === "next" ? -0.12 : 0.12} 0 0`,
      dur: 120,
      easing: "easeOutQuad"
    });

    incoming.setAttribute("animation__bounceBack", {
      property: "position",
      to: "0 0 0",
      dur: 220,
      delay: 120,
      easing: "easeOutBack"
    });

    // Squash & stretch vertical (eje Z visual)
    const model = incoming.children[0];

    model.setAttribute("animation__squash", {
      property: "scale",
      to: `${BASE_SCALE} ${BASE_SCALE} ${BASE_SCALE * 0.75}`,
      dur: 120,
      easing: "easeOutQuad"
    });

    model.setAttribute("animation__stretch", {
      property: "scale",
      to: `${BASE_SCALE} ${BASE_SCALE} ${BASE_SCALE}`,
      dur: 220,
      delay: 120,
      easing: "easeOutElastic"
    });

  }, 500);

  setTimeout(() => {
    outgoing.setAttribute("visible", "false");
    outgoing.object3D.position.x = 0;
    outgoing.children[0].material.opacity = 1;
    currentIndex = newIndex;
    isAnimating = false;
  }, 900);
}

// ================= SMOKE SYSTEM =================

function addSmoke(parent) {

  for (let i = 0; i < 8; i++) {

    const particle = document.createElement("a-sphere");

    particle.setAttribute("radius", 0.02);
    particle.setAttribute("color", "#ffffff");
    particle.setAttribute("opacity", 0.25);
    particle.setAttribute("transparent", true);

    resetParticle(particle);

    parent.appendChild(particle);

    animateParticle(particle);
  }
}

function resetParticle(p) {
  p.object3D.position.set(
    (Math.random() - 0.5) * 0.15,
    0.02,
    (Math.random() - 0.5) * 0.15
  );
  p.setAttribute("opacity", 0.25);
}

function animateParticle(p) {

  const rise = () => {

    p.setAttribute("animation__rise", {
      property: "position",
      to: `${p.object3D.position.x} ${0.4 + Math.random() * 0.2} ${p.object3D.position.z}`,
      dur: 2000 + Math.random() * 1000,
      easing: "linear"
    });

    p.setAttribute("animation__fade", {
      property: "material.opacity",
      to: 0,
      dur: 2000,
      easing: "linear"
    });

    setTimeout(() => {
      resetParticle(p);
      rise();
    }, 2200);
  };

  rise();
}

// ================= UI SYSTEM =================

document.querySelector("#next").addEventListener("click", () => {
  const next = (currentIndex + 1) % modelPaths.length;
  transitionTo(next, "next");
});

document.querySelector("#prev").addEventListener("click", () => {
  const prev = (currentIndex - 1 + modelPaths.length) % modelPaths.length;
  transitionTo(prev, "prev");
});

// Inicial
updatePreload();
modelCache.get(currentIndex).setAttribute("visible", "true");

</script>

</body>
</html>
