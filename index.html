<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

#startScreen{
  position:fixed;
  inset:0;
  background:url("Loading screen.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:60px;
  z-index:10;
}

#enterBtn{
  padding:18px 40px;
  font-size:22px;
  border:none;
  border-radius:14px;
  background:white;
  color:black;
  font-weight:bold;
}

.arrow{
  position:fixed;
  bottom:20px;
  font-size:30px;
  padding:10px 18px;
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  border-radius:12px;
  z-index:20;
  display:none;
}

#prev{ left:20px; }
#next{ right:20px; }
</style>
</head>

<body>

<div id="startScreen">
  <button id="enterBtn">Ver en tu mesa</button>
</div>

<button id="prev" class="arrow">←</button>
<button id="next" class="arrow">→</button>

<script>

const models = [
  "Plato_01.glb",
  "Plato_02.glb"
];

let currentIndex = 0;

const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isAndroid = /Android/i.test(navigator.userAgent);

document.getElementById("enterBtn").addEventListener("click", () => {
  document.getElementById("startScreen").style.display = "none";
  showArrows();

  if(isAndroid){
    launchSceneViewer();
  }else{
    startAFrame();
  }
});

function showArrows(){
  document.getElementById("prev").style.display="block";
  document.getElementById("next").style.display="block";
}

document.getElementById("prev").onclick=()=>{
  currentIndex=(currentIndex-1+models.length)%models.length;
  reloadModel();
};

document.getElementById("next").onclick=()=>{
  currentIndex=(currentIndex+1)%models.length;
  reloadModel();
};

function reloadModel(){
  if(isAndroid){
    launchSceneViewer();
  }else{
    document.querySelector("a-gltf-model")
      .setAttribute("src", models[currentIndex]);
  }
}

function launchSceneViewer(){

  const modelUrl =
    "https://mimenu3d.github.io/Margots/" + models[currentIndex];

  const url =
    "https://arvr.google.com/scene-viewer/1.0" +
    "?file=" + encodeURIComponent(modelUrl) +
    "&mode=ar_only" +
    "&resizable=false" +
    "&disable_occlusion=true";

  window.location.href = url;
}

function startAFrame(){

  const sceneHTML = `
  <a-scene
    mindar-image="
      imageTargetSrc: margot_targets.mind;
      autoStart: true;
      filterMinCF: 0.0001;
      filterBeta: 0.003;
    "
    renderer="
      physicallyCorrectLights: true;
      colorManagement: true;
      exposure: 2;
      toneMapping: ACESFilmicToneMapping;
    "
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets timeout="10000">
      <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
    <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="${models[currentIndex]}"
        rotation="90 0 0"
        scale="10 10 10">
      </a-gltf-model>
    </a-entity>

  </a-scene>
  `;

  document.body.insertAdjacentHTML("beforeend", sceneHTML);
}

// WakeLock
let wakeLock=null;
document.addEventListener("click", async()=>{
  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(e){}
});

</script>

</body>
</html>
