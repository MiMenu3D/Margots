<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo 3D AR</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
}

/* -------- Pantalla inicio -------- */

#startScreen{
  position:fixed;
  inset:0;
  background:url("Loading screen.png") center center / cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:20%;
  z-index:9999;
}

.mainButton{
  width:75%;
  max-width:320px;
  padding:16px;
  margin-bottom:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#ffffff;
  color:#000;
  font-weight:bold;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.fallbackButton{
  font-size:14px;
  color:#fff;
  text-decoration:underline;
  background:none;
  border:none;
  margin-top:10px;
}
</style>
</head>
<body>

<div id="startScreen">
  <button class="mainButton" onclick="startAR()">Ver en tu mesa</button>
  <button class="fallbackButton" onclick="openFallback()">¿No puedes verlo? Pulsa aquí</button>
</div>

<script>
/* ===========================
   CONFIG
=========================== */

const modelFile = "Plato_01.glb";

/* ===========================
   DETECCIÓN DISPOSITIVO
=========================== */

function isIOS(){
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function isAndroid(){
  return /Android/i.test(navigator.userAgent);
}

/* ===========================
   BOTÓN PRINCIPAL
=========================== */

function startAR(){
  if(isAndroid()){
    openSceneViewer();
  }else if(isIOS()){
    loadAFrame();
  }else{
    openFallback();
  }
}

/* ===========================
   ANDROID → SCENE VIEWER
=========================== */

function openSceneViewer(){

  const fileURL = window.location.href.replace(/\/[^\/]*$/, "/") + modelFile;

  const intent =
  "intent://arvr.google.com/scene-viewer/1.0?file=" + encodeURIComponent(fileURL) +
  "&mode=ar_only" +
  "&resizable=false" +
  "&disable_occlusion=true" +
  "#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;";

  window.location.href = intent;

  // salvavidas automático si falla
  setTimeout(()=>{
    openFallback();
  },6000);
}

/* ===========================
   iOS → A-FRAME (CORREGIDO)
=========================== */

function loadAFrame(){

  document.getElementById("startScreen").remove();

  const aframe = document.createElement("script");
  aframe.src = "https://aframe.io/releases/1.4.2/aframe.min.js?v="+Date.now();
  document.head.appendChild(aframe);

  aframe.onload = () => {

    const mindar = document.createElement("script");
    mindar.src = "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js?v="+Date.now();
    document.head.appendChild(mindar);

    mindar.onload = () => {

      setTimeout(()=>{

        const scene = document.createElement("a-scene");

        scene.setAttribute("mindar-image","imageTargetSrc: margot_targets.mind; autoStart: true;");
        scene.setAttribute("color-space","sRGB");
        scene.setAttribute("renderer","colorManagement: true; physicallyCorrectLights: true;");
        scene.setAttribute("vr-mode-ui","enabled: false");
        scene.setAttribute("device-orientation-permission-ui","enabled: false");
        scene.setAttribute("embedded","");

        scene.innerHTML = `
          <a-assets>
            <a-asset-item id="model" src="${modelFile}"></a-asset-item>
          </a-assets>

          <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

          <a-light type="ambient" intensity="1.2"></a-light>
          <a-light type="directional" intensity="3" position="1 3 2"></a-light>

          <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
              src="#model" 
              rotation="90 90 0" 
              scale="10 10 10">
            </a-gltf-model>
          </a-entity>
        `;

        document.body.appendChild(scene);

      },100);
    };
  };
}

/* ===========================
   FALLBACK → MODEL-VIEWER
=========================== */

function openFallback(){

  document.getElementById("startScreen").remove();

  const script = document.createElement("script");
  script.type = "module";
  script.src = "https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js";
  document.head.appendChild(script);

  const viewer = document.createElement("model-viewer");
  viewer.src = modelFile;
  viewer.setAttribute("camera-controls","");
  viewer.setAttribute("auto-rotate","");
  viewer.setAttribute("background-color","#000");
  viewer.style.width="100vw";
  viewer.style.height="100vh";

  document.body.appendChild(viewer);
}
</script>

</body>
</html>
