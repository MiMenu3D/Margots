<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menu AR</title>

<!-- A-Frame solo se carga si hace falta -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* Pantalla inicio */
#startScreen {
  position:fixed;
  inset:0;
  background:url("Loading screen.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-bottom:60px;
  z-index:10;
}

#enterBtn {
  padding:18px 40px;
  font-size:22px;
  border:none;
  border-radius:14px;
  background:white;
  color:black;
  font-weight:bold;
}

/* Escena A-Frame oculta por defecto */
#aFrameContainer {
  display:none;
}
</style>
</head>

<body>

<div id="startScreen">
  <button id="enterBtn">Ver en tu mesa</button>
</div>

<!-- ========= A-FRAME (fallback / iOS) ========= -->

<div id="aFrameContainer">
<a-scene
  mindar-image="
    imageTargetSrc: margot_targets.mind;
    autoStart: true;
    filterMinCF: 0.0001;
    filterBeta: 0.003;
  "
  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    exposure: 2;
    toneMapping: ACESFilmicToneMapping;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets timeout="10000">
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>

</a-scene>
</div>

<script>

// ===============================
// DETECCIÓN SIMPLE
// ===============================

const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
const isAndroid = /Android/i.test(navigator.userAgent);

document.getElementById("enterBtn").addEventListener("click", () => {

  document.getElementById("startScreen").style.display = "none";

  if (isIOS) {
    startAFrame();
  }

  else if (isAndroid) {
    launchSceneViewer();
  }

  else {
    startAFrame();
  }

});


// ===============================
// SCENE VIEWER (ANDROID)
// ===============================

function launchSceneViewer() {

  const modelUrl = location.origin + location.pathname.replace("index.html","") + "Plato_01.glb";

  const intent = `
  intent://arvr.google.com/scene-viewer/1.0
  ?file=${modelUrl}
  &mode=ar_only
  &resizable=false
  #Intent;scheme=https;package=com.google.ar.core;end;
  `;

  window.location.href = intent;

  // Fallback si falla en 2 segundos
  setTimeout(() => {
    startAFrame();
  }, 2000);
}


// ===============================
// A-FRAME
// ===============================

function startAFrame() {
  document.getElementById("aFrameContainer").style.display = "block";
}


// ===============================
// EVITAR PANTALLA QUE SE APAGA
// ===============================

let wakeLock = null;

async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

document.addEventListener("click", keepAwake);

</script>

</body>
</html>
