<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Plato</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

#loadingScreen {
  position:fixed;
  inset:0;
  background:url('Loading screen.png') no-repeat center center;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

#startAR {
  margin-bottom:60px;
  padding:18px 40px;
  font-size:20px;
  border:none;
  border-radius:40px;
  background:white;
  color:black;
}

#aFrameContainer {
  display:none;
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<div id="loadingScreen">
  <button id="startAR">Ver en tu mesa</button>
</div>

<div id="aFrameContainer">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="plato" src="Plato_01.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#plato"
        position="0 0 0"
        rotation="0 0 0"
        scale="1 1 1">
      </a-gltf-model>
    </a-entity>
  </a-scene>
</div>

<script>

const isAndroid = /Android/i.test(navigator.userAgent);
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

document.getElementById("startAR").addEventListener("click", () => {

  if (isAndroid) {
    launchSceneViewer();
  }
  else if (isIOS) {
    launchQuickLook();
  }
  else {
    launchAFRAME();
  }

});

function launchSceneViewer() {

  const link = document.createElement('a');
  link.setAttribute('rel', 'ar');
  link.setAttribute('href',
    `intent://arvr.google.com/scene-viewer/1.0?` +
    `file=${location.origin}/Margots/Plato_01.glb` +
    `&mode=ar_preferred` +
    `#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`
  );

  document.body.appendChild(link);
  link.click();
  link.remove();
}

function launchQuickLook() {

  const link = document.createElement('a');
  link.setAttribute('rel', 'ar');
  link.setAttribute('href', 'Plato_01.usdz');
  link.click();
}

function launchAFRAME() {

  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("aFrameContainer").style.display="block";
}

</script>

</body>
</html>
